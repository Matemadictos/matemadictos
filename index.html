<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATEMADICTOS — ACADEMIA DE MATEMATICAS</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --negro: #0a0a0a;
  --gris-oscuro: #111111;
  --gris-card: #161616;
  --gris-medio: #1c1c1c;
  --gris-borde: #252525;
  --neon: #39FF14;
  --neon-dim: rgba(57,255,20,0.07);
  --neon-mid: rgba(57,255,20,0.18);
  --neon-glow: rgba(57,255,20,0.35);
  --blanco: #f0f0f0;
  --blanco-dim: rgba(240,240,240,0.5);
  --blanco-faint: rgba(240,240,240,0.12);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--negro);
  font-family: 'Barlow', sans-serif;
  color: var(--blanco);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(57,255,20,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,20,0.018) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  z-index: 0;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 48px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(57,255,20,0.12);
}

.nav-logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: -0.5px;
  color: var(--blanco);
  text-decoration: none;
}
.nav-logo span { color: var(--neon); }

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}
.nav-links a {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--blanco-dim);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--neon); }

.nav-cta {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--negro);
  background: var(--neon);
  padding: 9px 28px 9px 20px;
  text-decoration: none;
  clip-path: polygon(0 0, 100% 0, 93% 100%, 0 100%);
  transition: box-shadow 0.2s, transform 0.2s;
}
.nav-cta:hover {
  box-shadow: 0 0 22px var(--neon-glow);
  transform: translateY(-1px);
}

/* FLOATING MATH */
.math-float {
  position: fixed;
  font-family: 'Rajdhani', sans-serif;
  color: rgba(57,255,20,0.05);
  pointer-events: none;
  z-index: 0;
  user-select: none;
  animation: floatSym linear infinite;
}
@keyframes floatSym {
  0%   { transform: translateY(0) rotate(0deg); }
  25%  { transform: translateY(-18px) rotate(3deg); }
  50%  { transform: translateY(-6px) rotate(-2deg); }
  75%  { transform: translateY(-24px) rotate(4deg); }
  100% { transform: translateY(0) rotate(0deg); }
}

/* HERO */
#hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  max-width: 1280px;
  margin: 0 auto;
  padding: 120px 80px 80px;
  position: relative;
  z-index: 1;
  gap: 40px;
}

.hero-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--neon);
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeInUp 0.6s ease 0.2s forwards;
}

.hero-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(50px, 6vw, 86px);
  font-weight: 700;
  line-height: 0.93;
  text-transform: uppercase;
  letter-spacing: -2px;
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeInUp 0.7s ease 0.4s forwards;
}
.hero-title .dim { color: var(--blanco-dim); }
.hero-title .neon {
  color: var(--neon);
  text-shadow: 0 0 28px var(--neon-glow), 0 0 56px rgba(57,255,20,0.12);
}

.hero-sub {
  font-size: 15px;
  font-weight: 300;
  color: var(--blanco-dim);
  max-width: 420px;
  line-height: 1.75;
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeInUp 0.7s ease 0.6s forwards;
}

.hero-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeInUp 0.7s ease 0.8s forwards;
}

.btn-primary {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--negro);
  background: var(--neon);
  padding: 14px 44px 14px 28px;
  text-decoration: none;
  clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%);
  transition: box-shadow 0.25s, transform 0.2s;
}
.btn-primary:hover {
  box-shadow: 0 0 32px var(--neon-glow), 0 0 64px rgba(57,255,20,0.1);
  transform: translateY(-2px);
}

.btn-secondary {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--blanco-dim);
  border: 1px solid var(--gris-borde);
  padding: 13px 28px;
  text-decoration: none;
  transition: color 0.2s, border-color 0.2s;
}
.btn-secondary:hover {
  color: var(--neon);
  border-color: rgba(57,255,20,0.35);
}

.hero-deco {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  animation: fadeIn 1.2s ease 0.7s forwards;
}

.hero-sigma {
  font-family: 'Rajdhani', sans-serif;
  font-size: 260px;
  font-weight: 700;
  color: transparent;
  -webkit-text-stroke: 1px rgba(57,255,20,0.18);
  line-height: 1;
  user-select: none;
  animation: pulseStroke 4s ease-in-out infinite;
}
@keyframes pulseStroke {
  0%,100% { -webkit-text-stroke-color: rgba(57,255,20,0.15); }
  50%      { -webkit-text-stroke-color: rgba(57,255,20,0.32); filter: drop-shadow(0 0 18px rgba(57,255,20,0.12)); }
}

.hero-formula {
  position: absolute;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: rgba(57,255,20,0.28);
  line-height: 2;
  user-select: none;
}
.hero-formula.tr { top: 8%; right: 4%; }
.hero-formula.bl { bottom: 8%; left: 4%; }

/* SCROLL REVEAL */
.reveal {
  opacity: 0;
  transform: translateY(26px);
  transition: opacity 0.65s ease, transform 0.65s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* STATS */
#stats {
  position: relative;
  z-index: 1;
  background: var(--gris-oscuro);
  border-top: 1px solid var(--gris-borde);
  border-bottom: 1px solid var(--gris-borde);
}

.stats-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 80px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}

.stat-item {
  padding: 44px 40px;
  border-right: 1px solid var(--gris-borde);
}
.stat-item:last-child { border-right: none; }

.stat-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 52px;
  font-weight: 700;
  color: var(--neon);
  line-height: 1;
  text-shadow: 0 0 20px rgba(57,255,20,0.22);
}
.stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--blanco-dim);
  margin-top: 5px;
}

/* SECTION LABEL */
.sec-label {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.sec-label span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--neon);
  white-space: nowrap;
}
.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(57,255,20,0.4), transparent);
  max-width: 180px;
}

.sec-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(34px, 4vw, 56px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: -1px;
  line-height: 0.95;
  margin-bottom: 52px;
}
.sec-title em { font-style: normal; color: var(--neon); }

/* SERVICIOS */
#servicios {
  position: relative;
  z-index: 1;
  padding: 100px 0;
  max-width: 1280px;
  margin: 0 auto;
  padding-left: 80px;
  padding-right: 80px;
}

.servicio-list { display: flex; flex-direction: column; }

.servicio-item {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 28px;
  padding: 30px 0;
  border-top: 1px solid var(--gris-borde);
  position: relative;
  overflow: hidden;
  cursor: default;
}
.servicio-item:last-child { border-bottom: 1px solid var(--gris-borde); }

.servicio-item::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--neon-dim);
  transform: scaleX(0);
